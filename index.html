<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="gameboard">
        <div class="header">
            <select class="player">
                <option value="friend">Play aginst Friend</option>
                <option value="computer">Play aginst Computer</option>
            </select>
            <div class="marker-round">
                <div class="player1">
                    <div class="marker-div"><button class="markerBtn x"></button></div>
                    <div class="playerScore">-</div>
                </div>
                <div class="player2">
                    <div class="marker-div"><button class="markerBtn o" ></button></div>
                    <div class="computerScore">-</div>
                </div>  
            </div>
            <div class="turn">
                <div>Start game or select player</div>
            </div>
        </div>
        <div class="playboard" id="playboard">
            <div class="cell " data-row="0" data-col="0" data-cell></div>
            <div class="cell " data-row="0" data-col="1" data-cell></div>
            <div class="cell " data-row="0" data-col="2" data-cell></div>
            <div class="cell " data-row="1" data-col="0" data-cell></div>
            <div class="cell " data-row="1" data-col="1" data-cell></div>
            <div class="cell " data-row="1" data-col="2" data-cell></div>
            <div class="cell " data-row="2" data-col="0" data-cell></div>
            <div class="cell " data-row="2" data-col="1" data-cell></div>
            <div class="cell " data-row="2" data-col="2" data-cell></div>
        </div>
        <div class="winning-message" id="winningMessage">
            <div data-winning-message-text></div>
            <button id="restartButton">Restart</button>
        </div>
    </div>
    <footer>
        <p>copyright &copy; 2026 FeteDev <a href="https://github.com/fetehadin/"><img src="images/image.png" alt="github-logo"></a></p>
    </footer>
</body>
</html>
